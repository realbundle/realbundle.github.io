<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>RealBundle — OpenGraph Template</title>
  <meta name="robots" content="noindex"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="/assets/css/realbundle.webflow.f2b644d95.min.css" rel="stylesheet" type="text/css"/>
  <style>
    body {
      -moz-osx-font-smoothing: grayscale;
      -webkit-font-smoothing: antialiased;
      margin: 0;
    }
    /* Fixed 1200x630 OpenGraph frame. Screenshot this element. */
    .og-frame {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }
    .og-frame .section {
      height: 100%;
      display: flex;
      align-items: center;
    }
    .og-frame .container {
      width: 100%;
    }
    /* RealBundle logo replaces the CTA button in the hero. */
    .og-logo {
      width: 220px;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="og-frame">
    <div class="section bg-gray-3">
      <div class="container">
        <div class="hero-row">
          <div class="content-width-medium">
            <h6 class="text-uppercase subheading">2023 Home Design Bundle</h6>
            <h1 class="display-heading">Triple the impact<br/>of your products.</h1>
            <div class="text-large">This February, join high-influence brands &amp; content creators to grow your audience, burst your revenue, and support great charities.</div>
            <div class="space-top"><img src="/assets/64509143557fdc934f8cf1b3_blue-rb-logo.svg" alt="RealBundle" class="og-logo"/></div>
          </div>
          <img src="/assets/64512ff5d4e5b619316f39e0_VideoGrid-min.webp" alt="" class="row-image-right"/>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
