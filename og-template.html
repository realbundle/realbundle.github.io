<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>RealBundle — OpenGraph Template</title>
  <meta name="robots" content="noindex"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="/assets/css/realbundle.webflow.f2b644d95.min.css" rel="stylesheet" type="text/css"/>
  <style>
    body {
      -moz-osx-font-smoothing: grayscale;
      -webkit-font-smoothing: antialiased;
      margin: 0;
    }
    /* Fixed 1200x630 OpenGraph frame. Screenshot this element.
       Equal padding on all four sides. */
    .og-frame {
      width: 1200px;
      height: 630px;
      box-sizing: border-box;
      padding: 48px;
      overflow: hidden;
    }
    .og-hero {
      display: flex;
      align-items: stretch;
      gap: 44px;
      height: 100%;
    }
    /* Left column stretches to the graphic's height: eyebrow pinned to
       the top, logo pinned to the bottom. */
    .og-text {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    /* Eyebrow ~50% larger than the site's 14px text-uppercase. */
    .og-eyebrow {
      font-size: 21px;
      line-height: 28px;
      margin-top: 0;
      margin-bottom: 22px;
    }
    .og-heading {
      margin: 0;
    }
    .og-logo {
      width: 240px;
      height: auto;
      display: block;
    }
    /* Graphic spans the full inner height; its top/bottom define the
       alignment for the eyebrow and logo on the left. */
    .og-graphic {
      flex: 0 0 auto;
      height: 100%;
      width: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="og-frame bg-gray-3">
    <div class="og-hero">
      <div class="og-text">
        <div class="og-top">
          <h6 class="text-uppercase subheading og-eyebrow">2023 Home Design Bundle</h6>
          <h1 class="display-heading og-heading">Triple the impact<br/>of your products.</h1>
        </div>
        <img class="og-logo" src="/assets/64509143557fdc934f8cf1b3_blue-rb-logo.svg" alt="RealBundle"/>
      </div>
      <img class="og-graphic" src="/assets/64512ff5d4e5b619316f39e0_VideoGrid-min.webp" alt=""/>
    </div>
  </div>
</body>
</html>
